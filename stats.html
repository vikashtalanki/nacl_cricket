                font-family: "Roboto Condensed";

            }
            .styled-table th {
                cursor: pointer;

                border: 2px solid white;
            }
            .styled-table tr {
                color: #ffffff;
                text-align: left;
                background-color: #012169;
            }

            }

    <script>
        $(document).on({
            ajaxStart: function(){
                $("body").addClass("loading"); 
            },
            ajaxStop: function(){ 
                $("body").removeClass("loading"); 
            }    
        });
        var script_url ="https://script.google.com/macros/s/AKfycbyy4BY8sb963Fk9_0TTF1_AP71OgD2yOL-5VzPufVpU0kNIf5GfO_iBUrQN0JmoPNVCAQ/exec";
        var cricclubs_url = "https://core-prod-origin.cricclubs.com/core/";
        var url_params = "clubId=27594&x-api-key=Z!wocr8&x-consumer-key=Y6%26afRE";
        var emailcheck=false;
        var minPartnershipStatRuns = 30;
        var minBatsmanStatScore = 30;
        var minBowlerStatWkts = 2;
        //var matchDates = ['02/11/2023','02/12/2023'];
        var matchDates = [];
        var seriesCalls = [];
        var _allTeamsMap = null;  // set after ready, used by rankings editor
        var _seriesNameToId = {}; // seriesName -> seriesId lookup
        var _childToParent  = {}; // childSeriesName -> parentSeriesName
        var _parentSeriesMap = {}; // parentSeriesName -> [childSeriesName, ...]
        var _teamLogoMap = {};    // teamName (uppercase) -> full logo URL
        var _smEditData  = null;   // populated when editing an existing row
        var _smEditTeamsRow  = null;
        var _smEditGroundRow = null;
        // Helper: append a text cell to a row and return the td
        function addCell(row, html) {
            var td = row.insertCell();
            td.innerHTML = html;
            return td;
        }

        $(document).ready(function () {
            var allMatchesMap = {};// Object<series, List<match>>
            const allPlayersMap = new Map();//Map<series, Map<team_name, Map<player_id, player_name>>>
            const allTeamsMap = new Map();//Map<series, Map<team_name, List<match>>>
            const allSeriesMap = new Map();
            $("#selSeries").html("");
            $("#selSeries").append('<option value="">Select Season</option>');
            $("#selSeries").show();
            $("#statsTableBody").html("");
            var seriesURL = cricclubs_url+"series/getSeriesList?"+url_params;
            seriesCalls.push($.getJSON(seriesURL, function (data) {
                // Pass 1: build full id->name map (includes parents)
                var _allSeriesById = {};
                $.each(data.data.seriesList, function (index, series) {
                    _allSeriesById[series.seriesID] = series.seriesName;
                });
                // Pass 2: build parent->children map (independent of allSeriesMap order)
                $.each(data.data.seriesList, function (index, series) {
                    if (series.parentSeriesId && series.parentSeriesId !== 0 && _allSeriesById[series.parentSeriesId]) {
                        var parentName = _allSeriesById[series.parentSeriesId];
                        _childToParent[series.seriesName] = parentName;
                        _parentSeriesMap[parentName] = _parentSeriesMap[parentName] || [];
                        if (!_parentSeriesMap[parentName].includes(series.seriesName))
                            _parentSeriesMap[parentName].push(series.seriesName);
                    }
                });
                // Pass 3: keep only leaf (child) series in allSeriesMap
                console.log("[Summary] _parentSeriesMap:", JSON.stringify(_parentSeriesMap));
                $.each(data.data.seriesList, function (index, series) {
                    allSeriesMap.set(series.seriesID, series.seriesName);
                    if(allSeriesMap.has(series.parentSeriesId)) {
                        allSeriesMap.delete(series.parentSeriesId);
                    }
                });
            }));
            $.when.apply($,seriesCalls).then(function() {
                $("#selSeries").append('<option value="allSeries">All</option>');
                console.log(allSeriesMap);
                console.log(allSeriesMap.size);
                allSeriesMap.forEach(function(seriesName, seriesId) {
                    console.log(seriesId);
                    _seriesNameToId[seriesName] = seriesId;
                    $("#selSeries").append('<option value="' + seriesName + '">' + seriesName + "</option>");
                    allPlayersMap.set(seriesName, new Map());
                    allTeamsMap.set(seriesName, new Map());
                    var allMatchesPerSeriesUrl = cricclubs_url+"match/getMatches?"+url_params+"&X-Auth-Token=&seriesId="+seriesId+"&teamId=&limit=10000";
                    $.getJSON(allMatchesPerSeriesUrl, function (data) {
                        $.each(data.data, function (idx, val) {
                            if(matchDates.includes(val.matchDate) || matchDates.length==0) {
                                allMatchesMap[seriesName] ??= [];
                                allMatchesMap[seriesName].push(val);
                                if(!allTeamsMap.get(seriesName).has(val.teamOneName))
                                    allTeamsMap.get(seriesName).set(val.teamOneName, []);
                                allTeamsMap.get(seriesName).get(val.teamOneName).push(val);
                                if(!allTeamsMap.get(seriesName).has(val.teamTwoName))
                                    allTeamsMap.get(seriesName).set(val.teamTwoName, []);
                                allTeamsMap.get(seriesName).get(val.teamTwoName).push(val);
                            }
                        });
                    });
                    var allTeamsPerSeriesUrl = cricclubs_url+"team/getTeamsList?"+url_params+"&seriesId="+seriesId;
                    $.getJSON(allTeamsPerSeriesUrl, function (data) {
                        $.each(data.data.teamsList, function (index, teamsList) {
                            $.each(teamsList.teams, function (index, team) {
                                allPlayersMap.get(seriesName).set(team.teamName, new Map());
                                // Try all known field names; build full URL if only UUID returned
                                var rawLogo = team.logo_file_path || '';
                                var logo = rawLogo
                                    ? 'https://media.cricclubs.com' + rawLogo
                                    : '';
                                if (logo) _teamLogoMap[team.teamName.toUpperCase()] = logo;
                                var playersURL = cricclubs_url+"team/getTeamPlayers?"+url_params+"&teamId=" + team.teamID;
                                $.getJSON(playersURL, function (data) {
                                    $.each(data.data.teamPlayers, function (index, player) {
                                        allPlayersMap.get(seriesName).get(team.teamName).set(player.playerID,player.firstName + " " + player.lastName);
                                    });
                                });
                            });
                        });
                    });
                });
            });
            function populateStatTypeSelect() {
                $("#selStatType").html(
                    '<option value="">Select Stat</option>' +
                    '<option value="ts">Team Scores</option>' +
                    '<option value="batf">Batting Figures</option>' +
                    '<option value="bf">Bowling Figures</option>' +
                    '<option value="ps">Partnerships</option>' +
                    '<option value="tstats">Team Stats</option>' +
                    '<option value="ranks">Rankings</option>' +
                    '<option value="seriesSummary">Summary</option>'
                );
                $("#selStatType").show();
            }
            _allTeamsMap = allTeamsMap;
            populateStatTypeSelect();

            $('#selSeries').on('change', function() {
                populateStatTypeSelect();
                $("#selTeam").html("");
                $("#selTeam").hide();
            });

            $('#selStatType').on('change', function() {
                if ( this.value == "tstats") {
                    $("#selTeam").html("");
                    var selectedSeries = $('#selSeries :selected').text();
                    $("#selTeam").append('<option value="">Select Team</option>');
                    for (let [series, teamMap] of allTeamsMap) {
                        if(selectedSeries === "All" || selectedSeries === series) {
                            for(let [team, match] of teamMap) {
                                $("#selTeam").append('<option value="'+team+'">'+team+'</option>');
                            }
                        }
                    }
                    $("#selTeam").show();
                    $("#btnEditRankings").hide();
                }
                else {
                    $("#selTeam").hide();
                    if (this.value == "ranks") {
                        $("#btnEditRankings").show();
                    } else {
                        $("#btnEditRankings").hide();
                    }
                }
            });

            $("#submit").show();
            $("#submit").click(function () {
                var selectedSeries = $('#selSeries :selected').text();
                var selectedStatType = $('#selStatType :selected').text();
                $("#statsTableBody").html("");
                var body = document.getElementById("statsTableBody");
                var tbl = document.createElement("table");
                tbl.setAttribute("class", "styled-table");
                tbl.setAttribute("style","table-layout:fixed");
                if(selectedStatType === "Team Scores") {
                    tbl.setAttribute("id", "scoresTable");
                    var tr = document.createElement('tr');

                    var sno = document.createElement('th');
                    sno.onclick = function(){
                        sortTable(selectedSeries,1,"scoresTable","number")
                    };
                    sno.appendChild(document.createTextNode("S.No. ↕"));
                    tr.appendChild(sno);

                    var seriesTH = document.createElement('th');
                    seriesTH.onclick = function(){
                        sortTable(selectedSeries,2,"scoresTable","text")
                    };
                    seriesTH.appendChild(document.createTextNode("Series ↕"));
                    tr.appendChild(seriesTH);

                    var dateTH = document.createElement('th');
                    dateTH.onclick = function(){
                        sortTable(selectedSeries,3,"scoresTable","date")
                    };
                    dateTH.appendChild(document.createTextNode("Date ↕"));
                    tr.appendChild(dateTH);

                    var matcTypeTH = document.createElement('th');
                    matcTypeTH.onclick = function(){
                        sortTable(selectedSeries,4,"scoresTable","text")
                    };
                    matcTypeTH.appendChild(document.createTextNode("Match Type ↕"));
                    tr.appendChild(matcTypeTH);

                    var scoreTH = document.createElement('th');
                    scoreTH.onclick = function(){
                        sortTable(selectedSeries,5,"scoresTable","score")
                    };
                    scoreTH.appendChild(document.createTextNode("Score ↕"));
                    tr.appendChild(scoreTH);

                    var teamTH = document.createElement('th');
                    teamTH.onclick = function(){
                        sortTable(selectedSeries,6,"scoresTable","text")
                    };
                    teamTH.appendChild(document.createTextNode("Team ↕"));
                    tr.appendChild(teamTH);

                    var oppTeamTH = document.createElement('th');
                    oppTeamTH.onclick = function(){
                        sortTable(selectedSeries,7,"scoresTable","text")
                    };
                    oppTeamTH.appendChild(document.createTextNode("Opponent ↕"));
                    tr.appendChild(oppTeamTH);

                    var oppScoreTH = document.createElement('th');
                    oppScoreTH.onclick = function(){
                        sortTable(selectedSeries,8,"scoresTable","score")
                    };
                    oppScoreTH.appendChild(document.createTextNode("Opponent Score ↕"));
                    tr.appendChild(oppScoreTH);

                    var winMarginTH = document.createElement('th');
                    winMarginTH.onclick = function(){
                        sortTable(selectedSeries,9,"scoresTable","winMargin")
                    };
                    winMarginTH.appendChild(document.createTextNode("Win Margin ↕"));
                    tr.appendChild(winMarginTH);

                    var rrDiffTH = document.createElement('th');
                    rrDiffTH.onclick = function(){
                        sortTable(selectedSeries,10,"scoresTable","float")
                    };
                    rrDiffTH.appendChild(document.createTextNode("RR Diff ↕"));
                    tr.appendChild(rrDiffTH);

                    var resultTH = document.createElement('th');
                    resultTH.appendChild(document.createTextNode("Result"));
                    tr.appendChild(resultTH);

                    tbl.appendChild(tr);
                }
                else if(selectedStatType === "Bowling Figures") {
                    tbl.setAttribute("id", "bowfTable");
                    var tr = document.createElement('tr');

                    var sno = document.createElement('th');
                    sno.onclick = function(){
                        sortTable(selectedSeries,1,"bowfTable","number")
                    };
                    sno.appendChild(document.createTextNode("S.No. ↕"));
                    tr.appendChild(sno);

                    var seriesTH = document.createElement('th');
                    seriesTH.appendChild(document.createTextNode("Series"));
                    tr.appendChild(seriesTH);

                    var dateTH = document.createElement('th');
                    dateTH.onclick = function(){
                        sortTable(selectedSeries,3,"bowfTable","date")
                    };
                    dateTH.appendChild(document.createTextNode("Date ↕"));
                    tr.appendChild(dateTH);

                    var matcTypeTH = document.createElement('th');
                    matcTypeTH.appendChild(document.createTextNode("Match Type"));
                    tr.appendChild(matcTypeTH);

                    var bbTH = document.createElement('th');
                    bbTH.onclick = function(){

                    };

                    var beTH = document.createElement('th');

                    var bowlerNameTH = document.createElement('th');

                    bowlerNameTH.appendChild(document.createTextNode("Bowler ↕"));
                    tr.appendChild(bowlerNameTH);

                    var teamTH = document.createElement('th');
                    teamTH.onclick = function(){
                        sortTable(selectedSeries,8,"bowfTable","text")
                    };
                    teamTH.appendChild(document.createTextNode("Team ↕"));
                    tr.appendChild(teamTH);

                    var againstTH = document.createElement('th');
                    againstTH.appendChild(document.createTextNode("Against"));
                    tr.appendChild(againstTH);
                    tbl.appendChild(tr);
                }
                else if(selectedStatType === "Batting Figures") {
                    tbl.setAttribute("id", "batfTable");
                    var tr = document.createElement('tr');

                    var sno = document.createElement('th');
                    sno.onclick = function(){

                    };
                    sno.appendChild(document.createTextNode("S.No. ↕"));
                    tr.appendChild(sno);

                    var seriesTH = document.createElement('th');
                    seriesTH.appendChild(document.createTextNode("Series"));
                    tr.appendChild(seriesTH);

                    var dateTH = document.createElement('th');
                    dateTH.onclick = function(){
                        sortTable(selectedSeries,3,"batfTable","date")
                    };

                    tr.appendChild(dateTH);

                    var matcTypeTH = document.createElement('th');

                    tr.appendChild(matcTypeTH);

                    var bbTH = document.createElement('th');
                    bbTH.onclick = function(){

        function getMaxTeamCount(allTeamsMap) {
            var maxCount = 0;
            for (let [series, teamMap] of allTeamsMap) {
                maxCount = Math.max(maxCount, teamMap.size);
            }
            return maxCount;
        }

        function getithRankedTeam(series, index) {
            var allRanksMap = getRankArray(series);
            if(index < allRanksMap.length) {
                return allRanksMap[index];
            }
            return "-";
        }

        function getTeamRank(series, team) {
            var allRanksMap = getRankArray(series);
            var rank = "";
            if (allRanksMap.includes(team)) {
                let teamIndex = allRanksMap.indexOf(team) + 1;
                let totalTeams = allRanksMap.length;

                // Assign rank title based on index
                if (teamIndex === 1) {
                    rank = "Champions";
                } else if (teamIndex === 2) {
                    rank = "Runners Up";
                } else if (teamIndex === 3 || teamIndex === 4) {
                    rank = "Semi Finalists";
                } else if (teamIndex >= 5 && teamIndex <= 8) {
                    rank = "Quarter Finalists";
                } else {
                    rank = teamIndex + " / " + totalTeams;
                }

                return rank;
            }
            return "- / " + allRanksMap.length;
        }


        function getFormattedDate(date) {
            let year = date.getFullYear();
            let month = (1 + date.getMonth()).toString().padStart(2, '0');
            let day = date.getDate().toString().padStart(2, '0');
          
            return month + '/' + day + '/' + year;
        }

        function getDayOfWeek(date) {
          const dayOfWeek = new Date(date).getDay();    
          return isNaN(dayOfWeek) ? null : 
            ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'][dayOfWeek];
        }

        function getDateString(date) {
            var date = new Date(date);
            return date.toDateString();
        }

        function compareValues(a, b) {
          // return -1/0/1 based on what you "know" a and b
          // are here. Numbers, text, some custom case-insensitive
          // and natural number ordering, etc. That's up to you.
          // A typical "do whatever JS would do" is:
          return (a<b) ? -1 : (a>b) ? 1 : 0;
        }

        function compareBF(series, a, b) {
            var ballsPerOver = getBallsPerOver(series);
            var aParts = a.split("-");
            var bParts = b.split("-");
            var aWickets = parseInt(aParts[3], 10);
            var bWickets = parseInt(bParts[3], 10);
            var aRuns = parseInt(aParts[2], 10);
            var bRuns = parseInt(bParts[2], 10);
            var aOverParts = aParts[0].split(".");
            var bOverParts = bParts[0].split(".");
            var aBalls = parseInt(aOverParts[0],10)*ballsPerOver + parseInt(aOverParts[1],10);
            var bBalls = parseInt(bOverParts[0],10)*ballsPerOver + parseInt(bOverParts[1],10);

            return (aWickets > bWickets) ? 1 : (aWickets < bWickets) ? -1 : (aRuns < bRuns) ? 1 : (aRuns > bRuns) ? -1 : (aBalls < bBalls) ? 1 : (aBalls > bBalls) ? -1 : 0;
        }

        function comparePS(a, b) {
            var totalARuns = parseInt(a.split("(")[0], 10);
            var totalABalls = parseInt(a.split("(")[1].split(")")[0], 10);
            var totalBRuns = parseInt(b.split("(")[0], 10);
            var totalBBalls = parseInt(b.split("(")[1].split(")")[0], 10);

            return (totalARuns > totalBRuns) ? 1 : (totalARuns < totalBRuns) ? -1 : (totalABalls < totalBBalls) ? 1 : (totalABalls > totalBBalls) ? -1 :  0;
        }

        function calculateRRDiff(series, t1total, t2total, t1balls, t2balls, t1wickets, t2wickets) {
            if(t1total == 0 || t2total == 0)
                return 0;
            var t1overs = getOvers(series, t1balls);
            var t2overs = getOvers(series, t2balls);
            var t1RR = 0;
            var t2RR = 0;
            if(t1wickets == 10)
                t1RR = (t1total/20).toFixed(2);
            else
                t1RR = (t1total/t1overs).toFixed(2);

            if(t2wickets == 10)
                t2RR = (t2total/20).toFixed(2);
            else
                t2RR = (t2total/t2overs).toFixed(2);

            return Math.abs(parseFloat(t1RR) - parseFloat(t2RR)).toFixed(2);
        }

        const sortState = new Map(); // key: "tableId-colnum"

        function sortTable(series,colnum,tableId,columnType) {
          var table = document.getElementById(tableId);
          let rows = Array.from(table.querySelectorAll(`tr`));
          rows = rows.slice(1);
          let qs = `td:nth-child(${colnum})`;

          var stateKey = tableId + '-' + colnum;
          var asc = sortState.get(stateKey) || false;

            rows.sort( (r1,r2) => {
                let t1 = r1.querySelector(qs);
                let t2 = r2.querySelector(qs);

                switch (columnType) {
                    case 'score':
                        return compareValues(parseInt(t1.textContent.split("/")[0], 10),parseInt(t2.textContent.split("/")[0], 10));
                    case 'date':
                        return compareValues(new Date(t1.textContent).getTime(),new Date(t2.textContent).getTime());
                    case 'text':
                        return compareValues(t1.textContent,t2.textContent);
                    case 'bowlingFigure':
                        return compareBF(series,t1.textContent,t2.textContent);
                    case 'partnership':
                        return comparePS(t1.textContent,t2.textContent);
                    case 'winMargin':
                        return compareValues(parseInt(t1.textContent.split(" ")[0], 10),parseInt(t2.textContent.split(" ")[0], 10));
                    case 'number':
                        return compareValues(parseInt(t1.textContent, 10),parseInt(t2.textContent, 10));
                    case 'float':
                        return compareValues(parseFloat(t1.textContent),parseFloat(t2.textContent));
                }
            });

            sortState.set(stateKey, !asc);
            if (!asc) rows = rows.reverse();

            rows.forEach(row => table.appendChild(row));
        }

        function getOvers(series,balls) {
            var ballsPerOver=getBallsPerOver(series);
            return Math.floor(balls / ballsPerOver)+"."+(balls % ballsPerOver);
        }

        function getBallsPerOver(series) {
            if(series == "Winter 2022-23")
                return 5;
            return 6;
        }

        function getEconomy(series,balls,runs) {
            var ballsPerOver=getBallsPerOver(series);
            var overs_pre_dec = Math.floor(balls / ballsPerOver);
            var overs_post_dec = ((balls % ballsPerOver) / ballsPerOver);
            return (runs/(overs_pre_dec + overs_post_dec)).toFixed(2);
        }

        // ── Dynamic latest-season summary row ─────────────────────────────────
        function appendLatestSeasonSummaryRow(tbl) {
            // Find the latest parent season that has children in allSeriesMap
            var parentNames = Object.keys(_parentSeriesMap);
            console.log("[Summary] parentNames:", parentNames);
            if (parentNames.length === 0) { console.warn("[Summary] _parentSeriesMap is empty — parent/child not detected"); return; }

            // Latest = last parent that appears in the list (API returns chronological order)
            var latestParent = parentNames[parentNames.length - 1];
            var children     = _parentSeriesMap[latestParent]; // e.g. ["Winter 2025-26 - A", "Winter 2025-26 - B", "Winter 2025-26 - C"]

            // Skip if this parent season is already hardcoded in the table
            // (check by seeing if the season label text already exists as a cell)
            var existingCells = tbl.querySelectorAll('td');
            for (var i = 0; i < existingCells.length; i++) {
                if (existingCells[i].textContent.trim().toUpperCase() === latestParent.toUpperCase()) return;
            }

            // Placeholder rows — will be populated once API calls complete
            var teamsRow  = tbl.insertRow(2);
            var groundRow = tbl.insertRow(2);

            var labelCell = groundRow.insertCell(0);
            labelCell.innerHTML = latestParent.toUpperCase();
            labelCell.rowSpan = 2;

            // Insert placeholder cells for up to 3 divisions (A/B/C)
            var divCount = Math.min(children.length, 3);
            for (var d = 0; d < 3; d++) {
                var tc = teamsRow.insertCell(d * 2);
                tc.innerHTML = '<div style="color:#888;font-size:12px;padding:8px;">Loading…</div>';
                var ru = teamsRow.insertCell(d * 2 + 1);
                ru.innerHTML = '<div style="color:#888;font-size:12px;padding:8px;">Loading…</div>';
                var gc = groundRow.insertCell(d + 1);
                gc.innerHTML = '-';
                gc.style.textAlign = 'center';
                gc.colSpan = 2;
            }

            // For each child division, find its Final match and fetch the scorecard
            children.slice(0, 3).forEach(function(childName, divIdx) {
                var seriesId = _seriesNameToId[childName];
                if (!seriesId) {
                    setDivisionCells(teamsRow, groundRow, divIdx, null, null, childName);
                    return;
                }
                var matchesUrl = cricclubs_url + 'match/getMatches?' + url_params +
                    '&X-Auth-Token=&seriesId=' + seriesId + '&teamId=&limit=10000';
                (function(sName, dIdx, tRow, gRow) {
                    $.getJSON(matchesUrl, function(data) {
                        // Find the Final match
                        var finalMatch = null;
                        $.each(data.data, function(_, m) {
                            if (m.matchType === 'f') { finalMatch = m; return false; }
                        });
                        if (!finalMatch) {
                            setDivisionCells(tRow, gRow, dIdx, null, null, sName);
                            return;
                        }
                        // Fetch scorecard for ground name
                        $.getJSON(cricclubs_url + 'scoreCard/getScoreCard?' + url_params + '&matchId=' + finalMatch.matchId,
                            function(sc) {
                                var ground = (sc.data.matchInfo && sc.data.matchInfo.ground) ? sc.data.matchInfo.ground : '';
                                setDivisionCells(tRow, gRow, dIdx, finalMatch, ground, sName);
                            }
                        ).fail(function() {
                            setDivisionCells(tRow, gRow, dIdx, finalMatch, '', sName);
                        });
                    }).fail(function() {
                        setDivisionCells(tRow, gRow, dIdx, null, null, sName);
                    });
                }(childName, divIdx, teamsRow, groundRow));
            });
        }

        function setDivisionCells(teamsRow, groundRow, divIdx, match, ground, seriesName) {
            var champIdx   = divIdx * 2;
            var runnerIdx  = divIdx * 2 + 1;
            var groundIdx  = divIdx + 1; // groundRow: col 0 = label, col 1/2/3 = divs

            if (!match) {
                teamsRow.cells[champIdx].innerHTML  = '<div style="color:#888;font-size:12px;padding:8px;">Final not played yet</div>';
                teamsRow.cells[runnerIdx].innerHTML = '-';
                groundRow.cells[groundIdx].innerHTML = '-';
                return;
            }

            // Determine champion and runner-up from match result
            var champ  = match.teamOneName;
            var runner = match.teamTwoName;
            var champScore  = formatScore(match.t1total, match.t1wickets, match.t1balls, seriesName);
            var runnerScore = formatScore(match.t2total, match.t2wickets, match.t2balls, seriesName);

            if (match.result && match.result.includes(match.teamTwoName + ' won')) {
                champ  = match.teamTwoName;  runner = match.teamOneName;
                champScore  = formatScore(match.t2total, match.t2wickets, match.t2balls, seriesName);
                runnerScore = formatScore(match.t1total, match.t1wickets, match.t1balls, seriesName);
            }

            teamsRow.cells[champIdx].innerHTML =
                '<div class="logo-txt-container"><h3 style="text-align:center;">' +
                champ.toUpperCase() + '<br><b style="color:#ffff00">' + champScore + '</b></h3></div>';
            teamsRow.cells[champIdx].style.backgroundColor = '#012169';

            teamsRow.cells[runnerIdx].innerHTML =
                '<div class="logo-txt-container"><h3 style="text-align:center;">' +
                runner.toUpperCase() + '<br><b style="color:#ffff00">' + runnerScore + '</b></h3></div>';

            var groundText = (match.matchDate || '') + (ground ? ', ' + ground : '');
            groundRow.cells[groundIdx].innerHTML = groundText || '-';
        }

        function formatScore(total, wickets, balls, seriesName) {
            var bpo = getBallsPerOver(seriesName || '');
            var overs = Math.floor(balls / bpo) + '.' + (balls % bpo);
            return total + (wickets < 10 ? '/' + wickets : '') + '(' + overs + ')';
        }

        function smGetVenue(id) {

                ? (document.getElementById(id+'GroundCustom').value.trim())
                : sel.value;

        function smFetchDivisionTeams(divConfigs, suffixes, type, editData) {
            var season = document.getElementById('smSeason').value.trim().toUpperCase();

            // Disable Add button; re-enable only after ALL divisions have resolved (success or fail)
            var addBtn = document.querySelector('#summaryModal .btn');
            var pending = divConfigs.length;
            function smDivLoaded() {
                if (--pending <= 0 && addBtn) {
                    addBtn.disabled = false;
                    addBtn.textContent = '\u2795 Add to Table';
                }
            }
            if (addBtn) { addBtn.disabled = true; addBtn.textContent = 'Loading\u2026'; }

            divConfigs.forEach(function(cfg, i) {
                (function(prefix, suffix, idx, ed) {
                    var targetName = season + suffix;
                    var seriesId = null;
                    Object.keys(_seriesNameToId).forEach(function(name) {
                        if (name.toUpperCase() === targetName) seriesId = _seriesNameToId[name];
                    });

                    var champSel  = document.getElementById(prefix + 'Champ');
                    var runnerSel = document.getElementById(prefix + 'Runner');

                    if (!seriesId) {
                        var noData = '<option value="">— no series found —</option>';
                        if (champSel)  champSel.innerHTML  = noData;
                        if (runnerSel) runnerSel.innerHTML = noData;
                        smDivLoaded(); // ← must count this division as done
                        return;
                    }

                    if (champSel)  champSel.innerHTML  = '<option value="">Loading\u2026</option>';
                    if (runnerSel) runnerSel.innerHTML = '<option value="">Loading\u2026</option>';

                    // Step 1: load teams, then chain final-match fetch inside success callback
                    // so selects are guaranteed populated before we try to auto-select values
                    $.getJSON(cricclubs_url + 'team/getTeamsList?' + url_params + '&seriesId=' + seriesId,
                        function(data) {
                            var teams = [];
                            $.each(data.data.teamsList, function(_, group) {
                                $.each(group.teams, function(_, team) {
                                    teams.push(team.teamName);
                                    var rawLogo = team.logo_file_path || '';
                                    var logo = rawLogo ? 'https://media.cricclubs.com' + rawLogo : '';
                                    if (logo) _teamLogoMap[team.teamName.toUpperCase()] = logo;
                                });
                            });
                            teams.sort();
                            var opts = '<option value="">-- Select --</option>' +
                                teams.map(function(t){ return '<option value="'+t+'">'+t+'</option>'; }).join('');
                            if (champSel)  champSel.innerHTML  = opts;
                            if (runnerSel) runnerSel.innerHTML = opts;

                            // Restore edit values now that options exist
                            if (ed && ed.divs && ed.divs[idx]) {
                                var edDiv = ed.divs[idx];
                                if (champSel)  champSel.value = edDiv.champ  || '';
                                if (runnerSel) runnerSel.value = edDiv.runner || '';
                                smSetInput(prefix + 'ChampScore',  edDiv.champScore);
                                smSetInput(prefix + 'RunnerScore', edDiv.runnerScore);
                                if (edDiv.date)   { var dateEl = document.getElementById(prefix+'Date'); if (dateEl) dateEl.value = edDiv.date; }
                                if (edDiv.ground) smSetGround(prefix, edDiv.ground);
                                smDivLoaded(); // editing path done
                                return;
                            }

                            // Step 2 (chained): find Final match and auto-fill — runs AFTER selects are ready
                            $.getJSON(cricclubs_url + 'match/getMatches?' + url_params +
                                    '&X-Auth-Token=&seriesId=' + seriesId + '&teamId=&limit=10000',
                                function(data) {
                                    var finalMatch = null;
                                    $.each(data.data, function(_, m) {
                                        if (m.matchType === 'f') { finalMatch = m; return false; }
                                    });
                                    smDivLoaded(); // matches call done — button can unlock
                                    if (!finalMatch) return;

                                    var champ  = finalMatch.teamOneName;
                                    var runner = finalMatch.teamTwoName;
                                    var bpo    = getBallsPerOver(targetName);
                                    var champScore  = smFormatScore(finalMatch.t1total, finalMatch.t1wickets, finalMatch.t1balls, bpo);
                                    var runnerScore = smFormatScore(finalMatch.t2total, finalMatch.t2wickets, finalMatch.t2balls, bpo);
                                    if (finalMatch.result && finalMatch.result.includes(finalMatch.teamTwoName + ' won')) {
                                        champ = finalMatch.teamTwoName; runner = finalMatch.teamOneName;
                                        champScore  = smFormatScore(finalMatch.t2total, finalMatch.t2wickets, finalMatch.t2balls, bpo);
                                        runnerScore = smFormatScore(finalMatch.t1total, finalMatch.t1wickets, finalMatch.t1balls, bpo);
                                    }

                                    if (champSel)  champSel.value  = champ;
                                    if (runnerSel) runnerSel.value = runner;
                                    smSetInput(prefix + 'ChampScore',  champScore);
                                    smSetInput(prefix + 'RunnerScore', runnerScore);

                                    if (finalMatch.matchDate) {
                                        var dateEl = document.getElementById(prefix + 'Date');
                                        if (dateEl) {
                                            var parts = finalMatch.matchDate.split('/');
                                            if (parts.length === 3)
                                                dateEl.value = parts[2] + '-' + parts[0].padStart(2,'0') + '-' + parts[1].padStart(2,'0');
                                        }
                                    }

                                    // Step 3: get ground from scoreCard (fire-and-forget, doesn't block button)
                                    $.getJSON(cricclubs_url + 'scoreCard/getScoreCard?' + url_params + '&matchId=' + finalMatch.matchId,
                                        function(sc) {
                                            var g = sc.data && sc.data.matchInfo && sc.data.matchInfo.ground;
                                            if (g) smSetGround(prefix, g);
                                        }
                                    );
                                }
                            ).fail(function() { smDivLoaded(); }); // getMatches fail
                        }
                    ).fail(function() {

                        if (champSel)  champSel.innerHTML  = err;

                    });
                }(cfg.prefix, suffixes[i] || '', i, editData));
            });
        }

                if (el.options[i].value === value) { el.value = value; return; }

            var sel = document.getElementById(prefix + 'Ground');

            // Check if it matches one of the preset options
            for (var i = 0; i < sel.options.length; i++) {
                if (sel.options[i].value.toLowerCase() === groundName.toLowerCase()) {
                    sel.value = sel.options[i].value;
                    return;

        async function saveSummaryToFile() {
            var season = smVal('smSeason');
            if (!season) { alert('Please enter a season label first.'); return; }
            if (!('showOpenFilePicker' in window)) {
                alert('File System Access API not supported. Please use Chrome or Edge.');
                return;
            }
            try {
                if (!_fileHandle) {
                    var handles = await window.showOpenFilePicker({
                        types: [{ description: 'HTML files', accept: { 'text/html': ['.html'] } }],
                        multiple: false
                    });
                    _fileHandle = handles[0];
                    saveHandleToIDB(_fileHandle);
                }
                var perm = await _fileHandle.queryPermission({ mode: 'readwrite' });
                if (perm !== 'granted') perm = await _fileHandle.requestPermission({ mode: 'readwrite' });
                if (perm !== 'granted') { alert('Write permission denied.'); return; }

                var file    = await _fileHandle.getFile();
                var current = await file.text();
                var newBlock = buildSummaryJsBlock(season, _smTableType);

                var anchor = _smTableType === '360'
                    ? '                    var t12tbl = document.createElement("table");'
                    : _smTableType === 'T12'
                    ? '                    var btbl = document.createElement("table");'
                    : '                    var mar2024Row = btbl.insertRow(2);';

                if (!current.includes(anchor)) {
                    alert('Could not find insertion point. Make sure this is the correct stats.html.');
                    return;
                }
                var updated  = current.replace(anchor, newBlock + '\n\n' + anchor);
                var writable = await _fileHandle.createWritable();
                await writable.write(updated);
                await writable.close();

                document.getElementById('smFileStatus').innerHTML =
                    '&#x2705; Saved to <b>' + _fileHandle.name + '</b> at ' + new Date().toLocaleTimeString() +
                    ' &nbsp;<a href="#" onclick="unlinkFile();return false;" style="color:#da291c;">Unlink</a>';
            } catch(err) {
                if (err.name !== 'AbortError') { console.error(err); alert('Save failed: ' + err.message); }
            }
        }

        // Read data out of a summary row-pair for pre-filling the edit form
        function smEditRow(btn, type) {
            var tbl = btn.closest('table');
            var editTd = btn.closest('td');

            // Find the teams row — it's the row containing the edit cell, or its sibling
            var teamsRow, groundRow, seasonLabel;
            if (type === 'Box') {
                teamsRow  = btn.closest('tr');
                groundRow = null;
                seasonLabel = teamsRow.cells[0].textContent.trim();
            } else {
                // Edit cell has rowSpan=2; its parentRow is the teamsRow
                teamsRow  = btn.closest('tr');
                groundRow = teamsRow.nextElementSibling;
                // Season label is in first cell of groundRow (rowSpan=2 means it appears in groundRow)
                seasonLabel = groundRow ? groundRow.cells[0].textContent.trim() : '';
            }

            function extractTeamData(cell) {
                if (!cell) return { champ: '', champScore: '', runner: '', runnerScore: '' };
                var h3s = cell.querySelectorAll('h3');
                // ... not reliable — instead read the select values that will be set
                return null; // signal: read from DOM cells
            }

            // Build editData by reading cell innerHTML text
            function cellText(cell) {
                if (!cell) return '';
                var h3 = cell.querySelector('h3');
                if (!h3) return cell.textContent.trim();
                var lines = h3.innerHTML.split('<br>');
                return lines[0].replace(/<[^>]+>/g, '').trim();
            }
            function cellScore(cell) {
                if (!cell) return '';
                var b = cell.querySelector('b');
                return b ? b.textContent.trim() : '';
            }
            function parseVenue(text) {
                // "16-Feb-2025, Loren Eden, Hayward" -> { date: "YYYY-MM-DD", ground: "Loren Eden, Hayward" }
                text = text.trim();
                var m = text.match(/^(\d{2}-\w{3}-\d{4}),\s*(.+)$/);
                if (m) {
                    var months = {Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
                    var parts = m[1].split('-');
                    return { date: parts[2]+'-'+months[parts[1]]+'-'+parts[0].padStart(2,'0'), ground: m[2].trim() };
                }
                return { date: '', ground: text };
            }

            var editData = { season: seasonLabel, divs: [] };

            if (type === '360') {
                for (var d = 0; d < 3; d++) {
                    var champCell  = teamsRow.cells[d * 2];
                    var runnerCell = teamsRow.cells[d * 2 + 1];
                    var groundCell = groundRow ? groundRow.cells[d + 1] : null;
                    var v = groundCell ? parseVenue(groundCell.textContent.trim()) : { date:'', ground:'' };
                    editData.divs.push({
                        champ: cellText(champCell), champScore: cellScore(champCell),
                        runner: cellText(runnerCell), runnerScore: cellScore(runnerCell),
                        date: v.date, ground: v.ground
                    });
                }
            } else if (type === 'T12') {
                var champCell  = teamsRow.cells[0];
                var runnerCell = teamsRow.cells[1];
                var groundCell = groundRow ? groundRow.cells[1] : null;
                var v = groundCell ? parseVenue(groundCell.textContent.trim()) : { date:'', ground:'' };
                editData.divs.push({
                    champ: cellText(champCell), champScore: cellScore(champCell),
                    runner: cellText(runnerCell), runnerScore: cellScore(runnerCell),
                    date: v.date, ground: v.ground
                });
            } else { // Box
                var champCell  = teamsRow.cells[1];
                var runnerCell = teamsRow.cells[2];
                editData.divs.push({
                    champ: cellText(champCell), champScore: cellScore(champCell),
                    runner: cellText(runnerCell), runnerScore: cellScore(runnerCell),
                    date: '', ground: ''
                });
            }

            // Store reference to the rows so we can replace them on save
            _smEditTeamsRow  = teamsRow;
            _smEditGroundRow = groundRow;

            openSummaryEditor(type, editData);
        }

        function getPOVResult(result, team) {
            var res = "";
            if(result.includes(team))
                res = result.replace(team+" ", '');
            else if(result.includes('Run') || result.includes('Wkt')) {
                res = "lost by " + result.split(' ')[result.split(' ').length-2] +" " +result.split(' ')[result.split(' ').length-1];
            }
            else
                res = result;
            return res.charAt(0).toUpperCase() + res.slice(1);
        }

            document.getElementById('reSeries').value = series;

            modal.style.display = 'block';

            // If we already have stored rankings for this series, load immediately
            if (RANK_ARRAYS[series] && RANK_ARRAYS[series].length > 0) {
                renderTeamList(RANK_ARRAYS[series]);
                return;
            }

            // Otherwise fetch teams from API on demand using the child series ID
            var seriesId = _seriesNameToId[series];
            if (!seriesId) {
                renderTeamList([]);

            renderTeamList([]); // show empty list while loading

            $.getJSON(cricclubs_url + 'team/getTeamsList?' + url_params + '&seriesId=' + seriesId,
                function(data) {

                    $.each(data.data.teamsList, function(_, group) {

                        });
                    });
                    teams.sort();
                    renderTeamList(teams);

            ).fail(function() {

                    '<li style="color:#da291c;padding:12px;">Failed to load teams. Try again.</li>';

                '<span class="re-handle">&#x2630;</span>' +
                '<span class="re-rank"><input type="number" class="re-rank-input" value="' + rank + '" min="1" title="Type position and press Enter"></span>' +
                '<span class="re-name">' + escHtml(name) + '</span>' +
                '<button class="re-del" title="Remove" onclick="removeTeamItem(this)">&#x2715;</button>';
            // Move to typed position on Enter or blur
            var inp = li.querySelector('.re-rank-input');
            function applyRankInput() {
                var ul    = document.getElementById('reTeamList');
                var total = ul.children.length;
                var pos   = Math.max(1, Math.min(parseInt(inp.value, 10) || 1, total));
                inp.value = pos;
                var items = Array.from(ul.children);
                var cur   = items.indexOf(li);
                if (cur === pos - 1) return; // already there
                ul.removeChild(li);
                var ref = ul.children[pos - 1] || null;
                ul.insertBefore(li, ref);
                refreshRanks();
            }
            inp.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') { e.preventDefault(); applyRankInput(); inp.blur(); }
            });
            inp.addEventListener('blur', applyRankInput);
            // Prevent drag starting when clicking the input
            inp.addEventListener('mousedown', function(e) { e.stopPropagation(); });
            return li;
        }

        function escHtml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function removeTeamItem(btn) {
            btn.closest('li').remove();
            refreshRanks();
        }

        function addTeamToEditor() {
            var inp  = document.getElementById('reNewTeam');
            var name = inp.value.trim();
            if (!name) return;
            var ul   = document.getElementById('reTeamList');
            var rank = ul.children.length + 1;
            ul.appendChild(makeTeamItem(name, rank));
            initDragAndDrop();
            inp.value = '';
            inp.focus();
        }

        function refreshRanks() {
            var items = document.getElementById('reTeamList').querySelectorAll('li');
            items.forEach(function(li, i) {
                var inp = li.querySelector('.re-rank-input');
                if (inp) inp.value = i + 1;
            });
        }

        // ── Drag-and-drop reorder ──────────────────────────────
        var dragSrc = null;
        function initDragAndDrop() {
            var items = document.getElementById('reTeamList').querySelectorAll('li');
            items.forEach(function(li) {
                li.addEventListener('dragstart', function(e) {
                    dragSrc = li;
                    e.dataTransfer.effectAllowed = 'move';
                });
                li.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    document.querySelectorAll('#reTeamList li').forEach(function(x){ x.classList.remove('drag-over'); });
                    li.classList.add('drag-over');
                });
                li.addEventListener('dragleave', function() {
                    li.classList.remove('drag-over');
                });
                li.addEventListener('drop', function(e) {
                    e.preventDefault();
                    li.classList.remove('drag-over');
                    if (dragSrc && dragSrc !== li) {
                        var ul = document.getElementById('reTeamList');
                        var allItems = Array.from(ul.children);
                        var srcIdx = allItems.indexOf(dragSrc);
                        var tgtIdx = allItems.indexOf(li);
                        if (srcIdx < tgtIdx) ul.insertBefore(dragSrc, li.nextSibling);
                        else                  ul.insertBefore(dragSrc, li);
                        refreshRanks();
                    }
                });
                li.addEventListener('dragend', function() {
                    document.querySelectorAll('#reTeamList li').forEach(function(x){ x.classList.remove('drag-over'); });
                });
            });
        }

        // ── Read current list order ────────────────────────────
        function getCurrentTeams() {
            return Array.from(document.querySelectorAll('#reTeamList li'))
                        .map(function(li){ return li.dataset.name; });
        }

        // ── Save to localStorage ───────────────────────────────
        function saveRankingsToStorage() {
            var series = document.getElementById('reSeries').value;
            if (!series) { alert('Select a series first.'); return; }
            RANK_ARRAYS[series] = getCurrentTeams();
            // persist full overrides object
            var stored = {};
            try { stored = JSON.parse(localStorage.getItem('rankArraysOverride') || '{}'); } catch(e){}
            stored[series] = RANK_ARRAYS[series];
            localStorage.setItem('rankArraysOverride', JSON.stringify(stored));
            alert('✅ Saved! Rankings for "' + series + '" are now active in this browser.');
        }

        // ── Export full RANK_ARRAYS code ───────────────────────
        // ── File System Access API ────────────────────────────
        var _fileHandle = null;

        // Restore persisted file handle from IndexedDB on page load
        (function restoreFileHandle() {
            var req = indexedDB.open('rankingsEditorDB', 1);
            req.onupgradeneeded = function(e) {
                e.target.result.createObjectStore('handles');
            };
            req.onsuccess = function(e) {
                var db  = e.target.result;
                var get = db.transaction('handles','readonly').objectStore('handles').get('statsFile');
                get.onsuccess = function() {
                    if (get.result) {
                        _fileHandle = get.result;
                        setFileStatus('&#x1F517; Linked: <b>' + _fileHandle.name + '</b> &nbsp;<a href="#" onclick="unlinkFile();return false;" style="color:#da291c;">Unlink</a>');
                    } else {
                        setFileStatus('&#x26A0;&#xFE0F; No file linked yet &mdash; click <b>Save to File</b> to pick stats.html once.');
                    }
                };
            };
        })();

        function saveHandleToIDB(handle) {
            var req = indexedDB.open('rankingsEditorDB', 1);
            req.onupgradeneeded = function(e) { e.target.result.createObjectStore('handles'); };
            req.onsuccess = function(e) {
                e.target.result.transaction('handles','readwrite').objectStore('handles').put(handle, 'statsFile');
            };
        }

        function unlinkFile() {
            _fileHandle = null;
            var req = indexedDB.open('rankingsEditorDB', 1);
            req.onsuccess = function(e) {
                e.target.result.transaction('handles','readwrite').objectStore('handles').delete('statsFile');
            };
            setFileStatus('&#x26A0;&#xFE0F; No file linked &mdash; click <b>Save to File</b> to pick stats.html.');
        }

        function setFileStatus(html) {
            var el = document.getElementById('reFileStatus');
            if (el) el.innerHTML = html;
        }

        function buildRankArraysCode() {
            var series = document.getElementById('reSeries').value;
            if (series) RANK_ARRAYS[series] = getCurrentTeams();
            var lines = ['        const RANK_ARRAYS = {'];
            var keys  = Object.keys(RANK_ARRAYS);
            keys.forEach(function(key, i) {
                var arr   = RANK_ARRAYS[key];
                var teams = arr.map(function(t){ return JSON.stringify(t); }).join(',');
                var comma = i < keys.length - 1 ? ',' : '';
                lines.push('            ' + JSON.stringify(key) + ': [' + teams + ']' + comma);
            });
            lines.push('        };');
            return lines.join('\n');
        }

        async function saveToFile() {
            if (!('showOpenFilePicker' in window)) {
                alert('File System Access API is not supported in this browser.\nPlease use Chrome or Edge.');
                return;
            }
            try {
                // First time: ask user to pick the file; subsequent calls reuse the stored handle
                if (!_fileHandle) {
                    var handles = await window.showOpenFilePicker({
                        types: [{ description: 'HTML files', accept: { 'text/html': ['.html'] } }],
                        multiple: false
                    });
                    _fileHandle = handles[0];
                    saveHandleToIDB(_fileHandle);
                    setFileStatus('&#x1F517; Linked: <b>' + _fileHandle.name + '</b> &nbsp;<a href="#" onclick="unlinkFile();return false;" style="color:#da291c;">Unlink</a>');
                }

                // Re-request permission if needed (e.g. after browser restart)
                var perm = await _fileHandle.queryPermission({ mode: 'readwrite' });
                if (perm !== 'granted') {
                    perm = await _fileHandle.requestPermission({ mode: 'readwrite' });
                }
                if (perm !== 'granted') {
                    alert('Write permission denied. Please allow access when prompted.');
                    return;
                }

                // Read, patch, write
                var file    = await _fileHandle.getFile();
                var current = await file.text();
                var newBlock = buildRankArraysCode();
                var pattern  = /const RANK_ARRAYS\s*=\s*\{[\s\S]*?\};/;
                if (!pattern.test(current)) {
                    alert('Could not locate RANK_ARRAYS in the file.\nMake sure you selected the correct stats.html.');
                    return;
                }
                var updated  = current.replace(pattern, newBlock);
                var writable = await _fileHandle.createWritable();
                await writable.write(updated);
                await writable.close();

                setFileStatus('&#x2705; Saved to <b>' + _fileHandle.name + '</b> at ' + new Date().toLocaleTimeString() + ' &nbsp;<a href="#" onclick="unlinkFile();return false;" style="color:#da291c;">Unlink</a>');
            } catch(err) {
                if (err.name !== 'AbortError') {
                    console.error(err);
                    alert('Save failed: ' + err.message);
                }
            }
        }

        function deleteCurrentSeries() {
            var series = document.getElementById('reSeries').value;
            if (!series) return;
            if (!confirm('Delete rankings for "' + series + '"?')) return;
            delete RANK_ARRAYS[series];
            // remove from localStorage too
            try {
                var stored = JSON.parse(localStorage.getItem('rankArraysOverride') || '{}');
                delete stored[series];
                localStorage.setItem('rankArraysOverride', JSON.stringify(stored));
            } catch(e){}
            closeRankingsEditor();
        }

        document.getElementById('btnEditRankings').addEventListener('click', function() {
            var series = $('#selSeries :selected').text();
            openRankingsEditor(series);
        });
        // Close modal on backdrop click
        document.getElementById('rankingsModal').addEventListener('click', function(e) {
            if (e.target === this) closeRankingsEditor();
        });
    </script>
</html>
